sft_checkpoint_path: outputs/sft/qwen3-vl-4b-lora
manifest_path: data/manifests/rl_manifest.jsonl
eval_manifest_path: data/manifests/local_holdout_eval.jsonl
output_dir: outputs/smoke/rl-qwen3-vl-4b
seed: 29
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 5.0e-6
weight_decay: 0.0
warmup_ratio: 0.03
max_grad_norm: 1.0
logging_steps: 1
save_steps: 10
save_total_limit: 1
bf16: true
gradient_checkpointing: true
use_peft: true
report_to: []
dry_run: true
smoke_max_samples: 4
resume_from_checkpoint: auto
dataloader_num_workers: 0
dataloader_pin_memory: true
dataloader_persistent_workers: false
ddp_find_unused_parameters: false
ddp_timeout: 1800
log_on_each_node: false
save_on_each_node: false
full_determinism: false
tf32: true
beta: 0.0
num_generations: 2
max_prompt_length: 1024
max_completion_length: 128
loss_type: grpo
scale_rewards: group
use_vllm: false
vllm_mode: colocate
reward_modules:
  - exact_match
  - normalized_label
  - clarify_vs_respond
  - hallucination_penalty
reward_weights:
  exact_match: 1.0
  normalized_label: 1.0
  clarify_vs_respond: 1.0
  hallucination_penalty: 1.0
lora:
  r: 8
  alpha: 16
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
