sft_checkpoint_path: outputs/sft/qwen3-vl-4b-lora
manifest_path: data/manifests/rl_manifest.jsonl
eval_manifest_path: data/manifests/local_holdout_eval.jsonl
output_dir: outputs/rl/grpo-qwen3-vl-4b-lora
seed: 29
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 5.0e-6
weight_decay: 0.0
warmup_ratio: 0.03
max_grad_norm: 1.0
logging_steps: 2
save_steps: 50
save_total_limit: 2
bf16: true
gradient_checkpointing: true
use_peft: true
dry_run: false
smoke_max_samples: 8
resume_from_checkpoint: auto
dataloader_num_workers: 2
dataloader_pin_memory: true
dataloader_persistent_workers: true
ddp_find_unused_parameters: false
ddp_timeout: 1800
log_on_each_node: false
save_on_each_node: false
full_determinism: false
tf32: true
beta: 0.0
num_generations: 4
max_prompt_length: 2048
max_completion_length: 256
loss_type: grpo
scale_rewards: group
use_vllm: false
vllm_mode: colocate
reward_modules:
  - exact_match
  - normalized_label
  - synonym_match
  - structured_format
  - uncertainty_calibration
  - clarify_vs_respond
  - management_coverage
  - hallucination_penalty
reward_weights:
  exact_match: 1.0
  normalized_label: 1.0
  synonym_match: 0.5
  structured_format: 0.5
  uncertainty_calibration: 0.5
  clarify_vs_respond: 1.0
  management_coverage: 0.5
  hallucination_penalty: 1.0
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
