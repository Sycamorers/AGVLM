manifest_path: data/manifests/full/sft_manifest.valid_images.jsonl
output_dir: outputs/smoke/sft-llama4-scout-17b-16e-turin-16gpu-zero3-preflight
seed: 17
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
num_train_epochs: 1
max_steps: 1
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.03
max_grad_norm: 1.0
logging_steps: 1
save_steps: 1000
save_strategy: "no"
eval_steps: 1000
save_total_limit: 1
bf16: true
fp16: false
gradient_checkpointing: true
loss_chunk_size: 128
use_peft: true
report_to:
  - tensorboard
run_name: sft-llama4-scout-17b-16e-turin-16gpu-zero3-preflight
dry_run: false
smoke_max_samples: 64
deepspeed: configs/deepspeed/zero3_lora_turin_24g.json
max_images_per_sample: 1
resume_from_checkpoint: null
dataloader_num_workers: 0
dataloader_pin_memory: true
dataloader_persistent_workers: false
ddp_find_unused_parameters: false
ddp_timeout: 1800
log_on_each_node: false
save_on_each_node: false
full_determinism: false
tf32: true
freeze:
  freeze_vision_encoder: true
  freeze_projector: false
  trainable_text_modules: []
lora:
  r: 8
  alpha: 16
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
