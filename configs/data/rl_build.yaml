datasets:
  - plantvillage
  - plantdoc
  - ip102
  - plantvillage_vqa
  - agbase
  - mirage
output_path: "{data_root}/manifests/{subset_tag}/rl_manifest.jsonl"
allowed_task_types:
  - classification
  - vqa
  - consultation
  - clarify_or_respond
exclude_splits:
  - test
allowed_verifier_modes:
  - label
  - exact_match
  - synonym
  - structured
  - clarify
max_answer_words: 80
# V1 GRPO training is scoped to one ground-level RGB image per sample.
# Multi-image MIRAGE tracks remain in evaluation manifests.
max_images_per_sample: 1
