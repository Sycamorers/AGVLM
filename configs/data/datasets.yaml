defaults:
  download_mode: partial
  sample_fraction: 0.1
  raw_dir_template: "{data_root}/raw/{dataset_name}/{subset_tag}"
  interim_path_template: "{data_root}/interim/{subset_tag}/{dataset_name}.jsonl"
  processed_dir_template: "{data_root}/processed/{dataset_name}/{subset_tag}"
  manifest_dir_template: "{data_root}/manifests/{subset_tag}"

datasets:
  - name: plantvillage
    task_family: sft
    source_type: hf_dataset
    access: public
    normalizer: classification_records
    materializer: plantvillage
    hf_repo_id: GVJahnavi/PlantVillage_dataset
    hf_config_names: [default]
    hf_split_names: [train, test]
    manual_url: https://huggingface.co/datasets/GVJahnavi/PlantVillage_dataset
    notes: Public Hugging Face dataset with explicit train and test splits.
    include_in_sft: true
    include_in_rl: true
    include_in_eval: false

  - name: plantdoc
    task_family: sft
    source_type: hf_dataset
    access: public
    normalizer: classification_records
    materializer: plantdoc
    hf_repo_id: agyaatcoder/PlantDoc
    hf_split_names: [train, test]
    manual_url: https://huggingface.co/datasets/agyaatcoder/PlantDoc
    notes: Public Hugging Face object-detection dataset materialized here as classification records using the most frequent annotation label per image.
    include_in_sft: true
    include_in_rl: true
    include_in_eval: true

  - name: ip102
    task_family: sft
    source_type: manual
    access: manual
    normalizer: ip102
    manual_url: https://github.com/xpwu95/IP102
    notes: No verified selective remote partial-download path is configured. Provide the official split files and images under the subset-tag raw directory.
    include_in_sft: true
    include_in_rl: true
    include_in_eval: true

  - name: plantvillage_vqa
    task_family: sft
    source_type: hf_dataset
    access: public
    normalizer: vqa_records
    materializer: plantvillage_vqa
    hf_repo_id: SyedNazmusSakib/PlantVillageVQA
    hf_split_names: [train]
    default_task_type: vqa
    manual_url: https://huggingface.co/datasets/SyedNazmusSakib/PlantVillageVQA
    license_name: cc-by-4.0
    notes: Public Hugging Face dataset with a single train split and per-row split tags.
    include_in_sft: true
    include_in_rl: true
    include_in_eval: true

  - name: agbase
    task_family: sft
    source_type: manual
    access: manual
    normalizer: consultation_records
    default_task_type: consultation
    manual_url: https://github.com/YuWang-1024/AgMMU
    notes: AgBase-style resources are not exposed through a verified selective remote-download path in this repo. Drop prepared records into the subset-tag raw directory.
    include_in_sft: true
    include_in_rl: true
    include_in_eval: false

  - name: mirage
    task_family: eval
    source_type: hf_dataset
    access: public
    normalizer: vqa_records
    materializer: mirage
    hf_repo_id: MIRAGE-Benchmark/MIRAGE
    hf_config_names: [MMST_Standard, MMST_Contextual, MMMT_Direct, MMMT_Decomp]
    hf_split_names: [train, dev, test]
    default_task_type: consultation
    manual_url: https://huggingface.co/datasets/MIRAGE-Benchmark/MIRAGE
    notes: Public Hugging Face benchmark with separate MMST and MMMT configurations.
    include_in_sft: true
    include_in_rl: true
    include_in_eval: true

  - name: agrillava
    task_family: sft
    source_type: manual
    access: manual
    normalizer: consultation_records
    default_task_type: consultation
    manual_url: https://huggingface.co/datasets/Agri-LLaVA-Anonymous/Agri_LLaVA_VQA_Bench
    notes: The Hub dataset builder is broken and the images are distributed as a monolithic archive, so this repo does not attempt a selective 10 percent remote download.
    include_in_sft: true
    include_in_rl: false
    include_in_eval: false
